<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticks Game</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🎮</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="game-container">
        <!-- Header -->
        <div class="game-header">
            <h1>Sticks Game</h1>
            <div class="turn-indicator">
                <span id="current-player-name">Player 1</span>'s Turn
            </div>
        </div>

        <!-- Game Board -->
        <div class="game-board">
            <!-- Player 1 (Top) -->
            <div class="player-section player-1">
                <div class="player-name" id="player1-name">Player 1</div>
                <div class="hands-container">
                    <div class="hand right-hand" id="p1-right-hand" draggable="true">
                        <img class="hand-emoji" id="p1-right-emoji" src="images/hand-1.png" alt="Right Hand">
                        <div class="hand-label">Right</div>
                        <div class="stick-count" id="p1-right-count">1</div>
                    </div>

                    <div class="hand left-hand" id="p1-left-hand" draggable="true">
                        <img class="hand-emoji" id="p1-left-emoji" src="images/hand-1.png" alt="Left Hand">
                        <div class="hand-label">Left</div>
                        <div class="stick-count" id="p1-left-count">1</div>
                    </div>
                </div>
            </div>

            <!-- VS Divider -->
            <div class="vs-divider">VS</div>

            <!-- Player 2 (Bottom) -->
            <div class="player-section player-2">
                <div class="player-name" id="player2-name">Player 2</div>
                <div class="hands-container">
                    <div class="hand right-hand" id="p2-right-hand" draggable="true">
                        <img class="hand-emoji" id="p2-right-emoji" src="images/hand-1.png" alt="Right Hand">
                        <div class="hand-label">Right</div>
                        <div class="stick-count" id="p2-right-count">1</div>
                    </div>

                    <div class="hand left-hand" id="p2-left-hand" draggable="true">
                        <img class="hand-emoji" id="p2-left-emoji" src="images/hand-1.png" alt="Left Hand">
                        <div class="hand-label">Left</div>
                        <div class="stick-count" id="p2-left-count">1</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Panel -->
        <div class="action-panel" id="action-panel">
            <div class="action-buttons">
                <button id="attack-btn" class="action-btn attack-btn">
                    <span class="btn-icon">⚔️</span>
                    <span class="btn-text">Attack</span>
                </button>
                <button id="redistribute-btn" class="action-btn redistribute-btn">
                    <span class="btn-icon">🔄</span>
                    <span class="btn-text">Redistribute</span>
                </button>
                <button id="new-game-btn" class="action-btn new-game-btn">
                    <span class="btn-icon">🔄</span>
                    <span class="btn-text">New Game</span>
                </button>
            </div>

            <!-- Attack Sub-Panel -->
            <div id="attack-panel" class="action-sub-panel" style="display: none;">
                <h3>Choose Your Attack</h3>
                <div id="attack-options" class="attack-options">
                    <!-- Attack options will be generated by JavaScript -->
                </div>
                <button id="cancel-attack-btn" class="cancel-btn">Cancel</button>
            </div>

            <!-- Redistribute Sub-Panel -->
            <div id="redistribute-panel" class="action-sub-panel" style="display: none;">
                <h3>Redistribute Sticks</h3>
                <p>Drag from one of your hands or select below:</p>
                <div id="redistribute-options" class="redistribute-options">
                    <!-- Redistribute options will be generated by JavaScript -->
                </div>
                <button id="cancel-redistribute-btn" class="cancel-btn">Cancel</button>
            </div>

        </div>

        <!-- Amount Input Panel -->
        <div id="amount-panel" class="modal" style="display: none;">
            <div class="modal-content">
                <h2>How Many Sticks?</h2>
                <div class="amount-selector">
                    <input type="number" id="amount-input" min="1" max="5" value="1">
                    <button id="confirm-amount-btn" class="confirm-btn">Confirm</button>
                    <button id="cancel-amount-btn" class="cancel-btn">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Message Display -->
        <div id="message-box" class="message-box"></div>

        <!-- Game Over Modal -->
        <div id="game-over-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h2>Game Over!</h2>
                <p id="winner-message"></p>
                <button id="play-again-btn" class="confirm-btn">Play Again</button>
            </div>
        </div>

        <!-- Setup Modal -->
        <div id="setup-modal" class="modal">
            <div class="modal-content">
                <h2>Sticks Game Setup</h2>
                <div class="form-group">
                    <label for="player1-input">Player 1 Name:</label>
                    <input type="text" id="player1-input" value="Player 1">
                </div>
                <div class="form-group">
                    <label for="player2-input">Player 2 Name:</label>
                    <input type="text" id="player2-input" value="Player 2">
                </div>
                <button id="start-game-btn" class="confirm-btn">Start Game</button>
            </div>
        </div>
    </div>

    <script src="ui.js"></script>
</body>

</html>
